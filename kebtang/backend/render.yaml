services:
  - type: web
    name: kebtang-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        sync: false
        placeholder: "Enter at least 32 characters"
      - key: MONGODB_URI
        sync: false
        placeholder: "mongodb+srv://..."
      - key: DEFAULT_ADMIN_PASSWORD
        value: admin123456789
      - key: NODE_ENV
        value: production
