name: Build and Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env file
        run: |
          echo "API_BASE_URL=https://kebtang-api.onrender.com/api" > .env
          echo "SOCKET_URL=https://kebtang-api.onrender.com" >> .env
        working-directory: kebtang

      - name: Get dependencies
        run: flutter pub get
        working-directory: kebtang

      - name: Build APK
        run: flutter build apk --release
        working-directory: kebtang

      - name: Rename APK
        run: mv kebtang/build/app/outputs/flutter-apk/app-release.apk kebtang/build/app/outputs/flutter-apk/kebtang_v2.0.1.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.1
          name: "Kebtang v2.0.1 (Stable)"
          body: |
            ## 🎉 New Release: Kebtang v2.0.1
            
            This is the stable release of the Kebtang Expense Tracker.
            
            ### Changes:
            - Switched to Release build for better performance.
            - Improved UI and language support.
            - Cleaned up repository structure.
            
            ### How to install:
            1. Download the `kebtang_v2.0.1.apk` below.
            2. Open the file on your Android device.
            3. Follow the prompts to install (you may need to allow "Install from unknown sources").
          draft: false
          prerelease: false
          files: kebtang/build/app/outputs/flutter-apk/kebtang_v2.0.1.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
