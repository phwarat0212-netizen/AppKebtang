name: Build and Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env file
        run: |
          echo "API_BASE_URL=https://kebtang-api.onrender.com/api" > .env
          echo "SOCKET_URL=https://kebtang-api.onrender.com" >> .env
        working-directory: kebtang

      - name: Get dependencies
        run: flutter pub get
        working-directory: kebtang

      - name: Build APK
        run: flutter build apk --release --split-per-abi
        working-directory: kebtang

      - name: Rename and Prepare APKs
        run: |
          cp kebtang/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk kebtang/kebtang_v2.0.1_arm32.apk
          cp kebtang/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk kebtang/kebtang_v2.0.1_arm64.apk
          cp kebtang/build/app/outputs/flutter-apk/app-x86_64-release.apk kebtang/kebtang_v2.0.1_x86_64.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.1
          name: "Kebtang v2.0.1 (Stable & Small)"
          body: |
            ## 🎉 New Release: Kebtang v2.0.1 (Optimized)
            
            This version is optimized for size (only 5-8MB).
            
            ### 📥 Download the right version for your phone:
            - **[kebtang_v2.0.1_arm64.apk](https://github.com/phwarat0212-netizen/AppKebtang/releases/download/v2.0.1/kebtang_v2.0.1_arm64.apk)** (แนะนำ! สำหรับมือถือรุ่นใหม่ส่วนใหญ่)
            - **[kebtang_v2.0.1_arm32.apk](https://github.com/phwarat0212-netizen/AppKebtang/releases/download/v2.0.1/kebtang_v2.0.1_arm32.apk)** (สำหรับมือถือรุ่นเก่า)
            
            ### How to install:
            1. Download the APK above.
            2. If you have an old version, **uninstall it first**.
            3. Install the new APK.
          draft: false
          prerelease: false
          files: |
            kebtang/kebtang_v2.0.1_arm32.apk
            kebtang/kebtang_v2.0.1_arm64.apk
            kebtang/kebtang_v2.0.1_x86_64.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
